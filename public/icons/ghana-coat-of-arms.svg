  <!-- Star center -->
  <path d="M32 30 L34.4 36.6 L41.4 36.8 L35.8 41 L37.8 47.7 L32 43.6 L26.2 47.7 L28.2 41 L22.6 36.8 L29.6 36.6 Z" fill="#E5B53C"/>
  <!-- Top crown bar -->
