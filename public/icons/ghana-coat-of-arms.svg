<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" fill="none" aria-hidden="true">
  <!-- Stylized Ghana coat-of-arms inspired emblem -->
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3886"/>
      <stop offset="100%" stop-color="#031B4E"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M32 4 L60 12 L60 36 C60 54 48 70 32 76 C16 70 4 54 4 36 L4 12 Z" fill="url(#shield)" stroke="#E5B53C" stroke-width="1.5"/>
  <!-- Cross divider -->
